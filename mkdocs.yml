site_name: System Engineering
site_description: Documentation for System Engineering concepts
site_url: https://arunp77.github.io/

theme:
  name: material

  # Logo (optional – remove if you don’t have it yet)
  # Put file in: docs/assets/logo.png
  logo: assets/logo.png

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - content.code.copy

  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

docs_dir: docs

nav:
  - Home: index.md

  - Chapters:
      - Chapter 0: chapters/phase-0.md
      - Chapter 1: chapters/phase-1.md
      - Chapter 2: chapters/phase-2.md
      - Chapter 3: chapters/phase-3.md
      - Chapter 4: chapters/phase-4.md
      - Chapter 5: chapters/phase-5.md
      - Chapter 6: chapters/phase-6.md
      - Chapter 7: chapters/phase-7.md
      - Chapter 8: chapters/phase-8.md
      - Chapter 9: chapters/phase-9.md

  - Appendix:
      - Appendix A: chapters/Appendix-A.md
      - Appendix B: chapters/Appendix-B.md
      - Appendix C: chapters/Appendix-C.md

  - Certification: chapters/certification.md

  - About: about.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arunp77

    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/arunp77

copyright: "© 2024 Arun Kumar Pandey"

extra_css:
  - stylesheets/extra.css
